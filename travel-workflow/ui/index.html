<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip Plan View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true">
      <span class="bg-orb orb-a"></span>
      <span class="bg-orb orb-b"></span>
      <span class="bg-grid"></span>
    </div>

    <main class="page-shell">
      <header class="hero" id="hero"></header>

      <section class="overview panel" id="overview"></section>

      <nav class="day-tabs-wrap panel" id="day-tabs-wrap">
        <div class="day-tabs" id="day-tabs"></div>
      </nav>

      <section class="content-grid">
        <article class="timeline-panel panel">
          <div class="day-head" id="day-head"></div>
          <div class="route-strip" id="route-strip"></div>
          <ul class="timeline" id="timeline"></ul>
        </article>

        <aside class="side-column">
          <section class="budget-panel panel" id="budget-panel"></section>
          <section class="choices-panel panel" id="choices-panel"></section>
        </aside>
      </section>

      <footer class="footer">Generated by local workflow engine</footer>
    </main>

    <script src="../output/data.generated.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
